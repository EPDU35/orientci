<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1f2e">
  <title>Assistant — OrientCI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page" id="app" style="position:relative;">

  <header style="background: var(--noir); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink:0;">
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="width: 40px; height: 40px; background: var(--orange); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div>
        <p style="font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; color: white; line-height: 1.2;">Assistant OrientCI</p>
        <p style="font-size: 0.72rem; color: rgba(255,255,255,0.45);">Appui contextuel · Profil chargé</p>
      </div>
    </div>
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #2ecc71;" id="statusDot"></div>
  </header>

  <div id="contextBanner" style="background: rgba(232,96,10,0.08); border-bottom: 1px solid rgba(232,96,10,0.15); padding: 10px 20px; display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--orange); font-weight: 500; flex-shrink:0;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span id="contextText">Contexte : Complète le quiz pour un appui personnalisé</span>
  </div>

  <div id="chatContainer" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); min-height: 0; background: var(--blanc);">

    <div style="display: flex; flex-direction: column; gap: 4px;">
      <div class="chat-bubble bot" id="welcomeMsg">
        Bonjour ! Je suis l'assistant OrientCI. Je connais le marché ivoirien et je peux t'aider à mieux comprendre ta filière recommandée.
      </div>
      <span class="chat-time" style="padding-left: 4px;" id="welcomeTime"></span>
    </div>

    <div class="quick-replies" id="quickReplies">
      <button class="quick-reply" data-msg="Débouchés en CI ?">Débouchés en CI ?</button>
      <button class="quick-reply" data-msg="Quelle école choisir ?">Quelle école ?</button>
      <button class="quick-reply" data-msg="Salaire moyen ?">Salaire moyen ?</button>
    </div>

    <div id="messagesArea"></div>

  </div>

  <div style="position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 10px 16px calc(10px + env(safe-area-inset-bottom)); background: var(--blanc); border-top: 1px solid var(--gris-light); display: flex; align-items: center; gap: 10px; z-index: 90;">
    <input type="text" id="chatInput" placeholder="Pose une question sur ton orientation..." style="flex: 1; padding: 12px 16px; background: var(--blanc-pur); border: 1.5px solid var(--gris-light); border-radius: var(--r-xl); font-size: 0.88rem; outline: none; font-family: var(--font-body); color: var(--noir); transition: border-color 0.15s ease;">
    <button id="sendBtn" style="width: 44px; height: 44px; background: var(--orange); border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s ease; box-shadow: 0 4px 12px rgba(232,96,10,0.3);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Accueil
    </a>
    <a href="catalogue.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Catalogue
    </a>
    <a href="results.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Résultats
    </a>
    <a href="assistant.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Assistant
    </a>
  </nav>
</div>

<script src="js/core/storage.js"></script>
<script>
  if (!Storage.isLoggedIn()) {
    window.location.replace('auth.html?from=assistant');
  } else if (!Storage.hasUsername()) {
    window.location.replace('username.html?from=assistant');
  }
</script>
<script src="js/assistant/chat.js"></script>
<script src="js/assistant/api.js"></script>
</body>
</html>
