<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f0e8">
    <title>Quiz — OrientCI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page" id="app">

    <header class="top-header">
        <a href="index.html" class="logo">Orient<span>CI</span></a>
        <button id="btnRetour" style="font-size: 0.85rem; color: var(--gris); font-weight: 500; display: flex; align-items: center; gap: 4px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Retour
        </button>
    </header>

    <div class="page-content" style="padding-top: 8px; padding-bottom: 100px;">

        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
            <span id="questionLabel" style="font-size: 0.82rem; font-weight: 600; color: var(--noir);">Question 1 sur 15</span>
            <span id="sectionLabel" style="font-size: 0.78rem; color: var(--gris);">Profil · Section 1/3</span>
        </div>

        <div class="progress-track" style="margin-bottom: 28px;">
            <div class="progress-fill" id="progressFill" style="width: 6.67%;"></div>
        </div>

        <div id="questionContainer" class="question-enter">

            <p class="label-sm orange" id="questionNum" style="margin-bottom: 8px;">QUESTION 1 / 15</p>
            <h2 id="questionText" style="font-family: var(--font-display); font-weight: 700; font-size: 1.35rem; line-height: 1.3; color: var(--noir); margin-bottom: 24px;">
                Dans quel domaine te sens-tu le plus à l'aise au lycée ?
            </h2>

            <div class="cards-list" id="optionsList" style="margin-bottom: 20px;"></div>

            <div class="hint-box" id="hintBox">
                <div class="hint-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Pourquoi cette question ?
                </div>
                <p class="hint-text" id="hintText">Tes matières préférées pèsent 40% dans le calcul de ton score.</p>
            </div>

        </div>

    </div>

    <div style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 12px 20px calc(12px + env(safe-area-inset-bottom)); background: var(--blanc); border-top: 1px solid var(--gris-light); display: flex; gap: 10px; z-index: 100;">
        <button class="btn-secondary" id="btnPrecedent" style="flex: 0 0 auto; padding: 14px 20px; opacity: 0.4; pointer-events: none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Précédent
        </button>
        <button class="btn-dark" id="btnSuivant" style="flex: 1; opacity: 0.4; pointer-events: none;">
            Suivant
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
    </div>

</div>

<script src="js/core/storage.js"></script>
<script src="js/quiz/questions.js"></script>
<script src="js/quiz/quiz.js"></script>
</body>
</html>
