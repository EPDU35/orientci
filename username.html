<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1f2e">
  <title>Ton prénom — OrientCI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .avatar-preview {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.8rem;
      color: white;
      margin: 0 auto 24px;
      transition: transform 0.2s ease;
    }

    .avatar-preview.has-value {
      transform: scale(1.05);
    }

    .username-input-wrap {
      position: relative;
    }

    .username-input-wrap input {
      text-align: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.3px;
    }

    .char-count {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.72rem;
      color: var(--gris);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="page">
  <main class="page-content page-fade" style="padding-top: 48px; padding-bottom: 48px; display:flex; flex-direction:column; align-items:center; text-align:center;">

    <div class="avatar-preview" id="avatarPreview">?</div>

    <a href="index.html" class="logo" style="display:inline-block; margin-bottom:20px;">Orient<span>CI</span></a>

    <h1 style="font-family:var(--font-display); font-weight:800; font-size:1.7rem; letter-spacing:-0.5px; margin-bottom:10px; line-height:1.2;">
      Comment on<br>t'appelle ?
    </h1>
    <p style="color:var(--gris); font-size:0.88rem; margin-bottom:36px; line-height:1.5;">
      Ce nom apparaîtra sur tes résultats.<br>Tu peux mettre ton prénom ou un pseudo.
    </p>

    <div style="width:100%; max-width:320px; margin-bottom:28px;">
      <div class="username-input-wrap">
        <input type="text" class="auth-input" id="usernameInput"
          placeholder="Ton prénom ou pseudo"
          maxlength="24"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
          style="text-align:center; font-family:var(--font-display); font-weight:700; font-size:1.1rem; letter-spacing:-0.3px; padding-right:50px;">
        <span class="char-count" id="charCount">0/24</span>
      </div>
      <div id="usernameError" style="display:none; font-size:0.78rem; color:#c83232; margin-top:8px; text-align:center;"></div>
    </div>

    <div style="width:100%; max-width:320px; display:flex; flex-direction:column; gap:10px;">
      <button class="btn-primary" id="btnConfirm" style="opacity:0.4; pointer-events:none;">
        Voir mes résultats
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </div>

    <p style="font-size:0.72rem; color:var(--gris); margin-top:24px; line-height:1.6; max-width:260px;">
      Tu pourras changer ce nom dans ton profil plus tard.
    </p>

  </main>
</div>

<script src="js/core/storage.js"></script>
<script>
  if (!Storage.isLoggedIn()) {
    window.location.replace('auth.html');
  }

  const params = new URLSearchParams(window.location.search);
  const fromPage = params.get('from') || 'quiz';

  const input = document.getElementById('usernameInput');
  const btnConfirm = document.getElementById('btnConfirm');
  const avatarPreview = document.getElementById('avatarPreview');
  const charCount = document.getElementById('charCount');
  const usernameError = document.getElementById('usernameError');

  input.addEventListener('input', function () {
    const val = this.value.trim();
    const len = this.value.length;

    charCount.textContent = len + '/24';
    usernameError.style.display = 'none';

    if (val.length >= 2) {
      avatarPreview.textContent = val[0].toUpperCase();
      avatarPreview.classList.add('has-value');
      btnConfirm.style.opacity = '1';
      btnConfirm.style.pointerEvents = 'auto';
    } else {
      avatarPreview.textContent = val.length === 1 ? val[0].toUpperCase() : '?';
      avatarPreview.classList.remove('has-value');
      btnConfirm.style.opacity = '0.4';
      btnConfirm.style.pointerEvents = 'none';
    }
  });

  btnConfirm.addEventListener('click', function () {
    const val = input.value.trim();

    if (val.length < 2) {
      usernameError.textContent = 'Le nom doit faire au moins 2 caractères.';
      usernameError.style.display = 'block';
      return;
    }

    const user = Storage.loadUser() || {};
    user.username = val;
    Storage.saveUser(user);

    const dest = fromPage === 'assistant' ? 'assistant.html'
               : fromPage === 'catalogue' ? 'catalogue.html'
               : 'results.html';

    window.location.href = dest;
  });

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') btnConfirm.click();
  });

  input.focus();
</script>
</body>
</html>
