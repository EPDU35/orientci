<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1f2e">
  <title>Connexion — OrientCI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page">

  <div style="padding:16px 20px 0; display:flex; align-items:center;">
    <a href="index.html" style="display:flex; align-items:center; gap:6px; color:var(--gris); font-size:0.85rem; font-weight:500; text-decoration:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Retour
    </a>
  </div>

  <main class="page-content page-fade" style="padding-top:28px; padding-bottom:48px;">

    <div id="quizContext" style="display:none; background:rgba(232,96,10,0.08); border:1px solid rgba(232,96,10,0.2); border-radius:var(--r-lg); padding:14px 16px; margin-bottom:24px;">
      <p class="label-sm orange" style="margin-bottom:6px;">Quiz terminé</p>
      <p style="font-size:0.85rem; color:var(--noir); font-weight:600;">Crée un compte pour voir tes résultats.</p>
    </div>

    <div style="margin-bottom:28px;">
      <a href="index.html" class="logo" style="display:inline-block; margin-bottom:16px;">Orient<span>CI</span></a>
      <h1 id="authTitle" style="font-family:var(--font-display); font-weight:800; font-size:1.6rem; letter-spacing:-0.5px; margin-bottom:6px;">Connexion</h1>
      <p id="authSubtitle" style="color:var(--gris); font-size:0.88rem;">Retrouve tes résultats et ton historique</p>
    </div>

    <div class="auth-card" style="margin-bottom:16px;">

      <div style="display:flex; gap:0; margin-bottom:20px; background:var(--gris-light); border-radius:var(--r-md); padding:3px;" id="modeSwitch">
        <button id="btnModeLogin" style="flex:1; padding:9px; border-radius:10px; font-size:0.85rem; font-weight:600; font-family:var(--font-body); border:none; cursor:pointer; background:white; color:var(--noir); box-shadow:var(--shadow-sm); transition:all 0.15s ease;">Connexion</button>
        <button id="btnModeRegister" style="flex:1; padding:9px; border-radius:10px; font-size:0.85rem; font-weight:600; font-family:var(--font-body); border:none; cursor:pointer; background:transparent; color:var(--gris); transition:all 0.15s ease;">Inscription</button>
      </div>

      <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:16px;">
        <div>
          <label style="font-size:0.78rem; font-weight:600; color:var(--gris); display:block; margin-bottom:6px;">Email</label>
          <input type="email" class="auth-input" id="emailInput" placeholder="ton@email.com" autocomplete="email">
        </div>
        <div>
          <label style="font-size:0.78rem; font-weight:600; color:var(--gris); display:block; margin-bottom:6px;">Mot de passe</label>
          <div style="position:relative;">
            <input type="password" class="auth-input" id="passwordInput" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px;">
            <button id="togglePwd" type="button" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--gris); padding:4px; display:flex; align-items:center;">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div id="authError" style="display:none; background:rgba(220,50,50,0.08); border:1px solid rgba(220,50,50,0.2); border-radius:var(--r-sm); padding:10px 12px; margin-bottom:12px; font-size:0.82rem; color:#c83232; line-height:1.4;"></div>

      <button class="btn-dark" id="btnAuth" style="margin-bottom:16px; width:100%;">Se connecter</button>

      <div class="divider-or" style="margin-bottom:14px;">ou</div>

      <button class="btn-google" id="btnGoogle">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continuer avec Google
      </button>

    </div>

    <p style="text-align:center; font-size:0.78rem; color:var(--gris);">
      <span id="toggleText">Pas de compte ?</span>
      <button id="toggleMode" style="color:var(--orange); font-weight:600; background:none; border:none; cursor:pointer; font-size:0.78rem; font-family:var(--font-body); margin-left:4px;">S'inscrire gratuitement</button>
    </p>

  </main>
</div>

<script src="js/core/storage.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const fromPage = params.get('from') || '';

  if (fromPage === 'quiz') {
    document.getElementById('quizContext').style.display = 'block';
    document.getElementById('authTitle').textContent = 'Presque fini';
    document.getElementById('authSubtitle').textContent = 'Crée un compte pour sauvegarder tes résultats';
    setMode('register');
  } else if (fromPage === 'assistant') {
    document.getElementById('authTitle').textContent = 'Accès requis';
    document.getElementById('authSubtitle').textContent = 'Connecte-toi pour utiliser l\'assistant IA';
  } else if (fromPage === 'catalogue' || fromPage === 'results') {
    document.getElementById('authTitle').textContent = 'Connexion requise';
    document.getElementById('authSubtitle').textContent = 'Connecte-toi pour accéder à cette section';
  }

  let currentMode = 'login';

  const btnBase = 'flex:1; padding:9px; border-radius:10px; font-size:0.85rem; font-weight:600; font-family:var(--font-body); border:none; cursor:pointer; transition:all 0.15s ease;';

  function setMode(mode) {
    currentMode = mode;
    const loginBtn = document.getElementById('btnModeLogin');
    const registerBtn = document.getElementById('btnModeRegister');

    loginBtn.style.cssText = btnBase + (mode === 'login'
      ? 'background:white; color:var(--noir); box-shadow:var(--shadow-sm);'
      : 'background:transparent; color:var(--gris);');
    registerBtn.style.cssText = btnBase + (mode === 'register'
      ? 'background:white; color:var(--noir); box-shadow:var(--shadow-sm);'
      : 'background:transparent; color:var(--gris);');

    document.getElementById('btnAuth').textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
    document.getElementById('toggleText').textContent = mode === 'login' ? 'Pas de compte ?' : 'Déjà un compte ?';
    document.getElementById('toggleMode').textContent = mode === 'login' ? 'S\'inscrire gratuitement' : 'Se connecter';
    document.getElementById('authError').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function afterAuth(userData) {
    Storage.login(userData);
    if (Storage.hasUsername()) {
      const dest = fromPage === 'assistant' ? 'assistant.html'
                 : fromPage === 'catalogue' ? 'catalogue.html'
                 : 'results.html';
      window.location.href = dest;
    } else {
      window.location.href = 'username.html?from=' + (fromPage || 'quiz');
    }
  }

  document.getElementById('btnModeLogin').addEventListener('click', function () { setMode('login'); });
  document.getElementById('btnModeRegister').addEventListener('click', function () { setMode('register'); });
  document.getElementById('toggleMode').addEventListener('click', function () {
    setMode(currentMode === 'login' ? 'register' : 'login');
  });

  document.getElementById('togglePwd').addEventListener('click', function () {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  });

  document.getElementById('btnAuth').addEventListener('click', function () {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    if (!email || !email.includes('@')) { showError('Saisis une adresse email valide.'); return; }
    if (!password || password.length < 6) { showError('Le mot de passe doit faire au moins 6 caractères.'); return; }
    afterAuth({ email, username: '', provider: 'email', createdAt: Date.now() });
  });

  document.getElementById('btnGoogle').addEventListener('click', function () {
    afterAuth({ email: 'utilisateur@gmail.com', username: '', provider: 'google', createdAt: Date.now() });
  });

  document.getElementById('passwordInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('btnAuth').click();
  });
</script>
</body>
</html>
