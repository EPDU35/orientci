<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f0e8">
    <title>Connexion — OrientCI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page">

    <div style="padding: 20px 20px 0; display: flex; align-items: center; gap: 8px;">
        <a href="index.html" style="display: flex; align-items: center; gap: 6px; color: var(--gris); font-size: 0.85rem; font-weight: 500;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Retour
        </a>
    </div>

    <main class="page-content page-fade" style="padding-top: 32px; padding-bottom: 40px;">

        <div style="margin-bottom: 28px;">
            <a href="index.html" class="logo" style="display: inline-block; margin-bottom: 16px;">Orient<span>CI</span></a>
            <h1 style="font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; margin-bottom: 6px;">Connexion</h1>
            <p style="color: var(--gris); font-size: 0.88rem;">Retrouve tes résultats et ton historique</p>
        </div>

        <div class="auth-card" style="margin-bottom: 16px;">

            <div id="modeSwitch" style="display: flex; gap: 0; margin-bottom: 20px; background: var(--gris-light); border-radius: var(--r-md); padding: 3px;">
                <button class="mode-btn active" data-mode="login" style="flex: 1; padding: 9px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; font-family: var(--font-body); border: none; cursor: pointer; background: white; color: var(--noir); box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: all 0.15s ease;">Connexion</button>
                <button class="mode-btn" data-mode="register" style="flex: 1; padding: 9px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; font-family: var(--font-body); border: none; cursor: pointer; background: transparent; color: var(--gris); transition: all 0.15s ease;">Inscription</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;">
                <div id="usernameField" style="display: none;">
                    <label style="font-size: 0.78rem; font-weight: 600; color: var(--gris); display: block; margin-bottom: 6px;">Nom d'utilisateur</label>
                    <input type="text" class="auth-input" placeholder="Ton prénom ou pseudo">
                </div>
                <div>
                    <label style="font-size: 0.78rem; font-weight: 600; color: var(--gris); display: block; margin-bottom: 6px;">Email</label>
                    <input type="email" class="auth-input" id="emailInput" placeholder="ton@email.com">
                </div>
                <div>
                    <label style="font-size: 0.78rem; font-weight: 600; color: var(--gris); display: block; margin-bottom: 6px;">Mot de passe</label>
                    <input type="password" class="auth-input" id="passwordInput" placeholder="••••••••">
                </div>
            </div>

            <button class="btn-dark" id="btnAuth" style="width: 100%; margin-bottom: 16px;">Se connecter</button>

            <div class="divider-or" style="margin-bottom: 14px;">ou</div>

            <button class="btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continuer avec Google
            </button>

        </div>

        <p style="text-align: center; font-size: 0.78rem; color: var(--gris);">
            Pas de compte ?
            <button id="toggleMode" style="color: var(--orange); font-weight: 600; background: none; border: none; cursor: pointer; font-size: 0.78rem; font-family: var(--font-body);">S'inscrire gratuitement</button>
        </p>

    </main>
</div>

<script>
    const modeBtns = document.querySelectorAll('.mode-btn');
    const usernameField = document.getElementById('usernameField');
    const btnAuth = document.getElementById('btnAuth');
    const toggleMode = document.getElementById('toggleMode');

    let currentMode = 'login';

    function setMode(mode) {
        currentMode = mode;
        modeBtns.forEach(b => {
            const isActive = b.dataset.mode === mode;
            b.style.background = isActive ? 'white' : 'transparent';
            b.style.color = isActive ? 'var(--noir)' : 'var(--gris)';
            b.style.boxShadow = isActive ? '0 1px 4px rgba(0,0,0,0.08)' : 'none';
        });
        usernameField.style.display = mode === 'register' ? 'block' : 'none';
        btnAuth.textContent = mode === 'register' ? "Créer mon compte" : "Se connecter";
        toggleMode.textContent = mode === 'register' ? "J'ai déjà un compte" : "S'inscrire gratuitement";
    }

    modeBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
    toggleMode.addEventListener('click', () => setMode(currentMode === 'login' ? 'register' : 'login'));

    // redirect vers results après auth simulée
    btnAuth.addEventListener('click', () => {
        const email = document.getElementById('emailInput').value;
        if (!email) return;
        window.location.href = 'results.html';
    });
</script>
</body>
</html>
