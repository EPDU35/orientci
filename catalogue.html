<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f0e8">
    <title>Catalogue — OrientCI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page" id="app">

    <header class="top-header" style="padding: 14px 20px;">
        <div>
            <a href="index.html" class="logo">Orient<span>CI</span></a>
            <span style="font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; color: var(--noir); margin-left: 0; display: block; letter-spacing: -0.5px; line-height: 1;">Explorer</span>
        </div>
        <span style="font-size: 0.82rem; color: var(--gris); font-weight: 500;">Catalogue</span>
    </header>

    <div class="page-content" style="padding-top: 8px; padding-bottom: 80px;">

        <div class="tab-bar" style="margin-bottom: 16px;" id="tabBar">
            <button class="tab-btn active" data-tab="metiers">Métiers</button>
            <button class="tab-btn" data-tab="ecoles">Établissements</button>
            <button class="tab-btn" data-tab="filieres">Filières</button>
        </div>

        <div class="search-wrap" style="margin-bottom: 14px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" class="search-input" id="searchInput" placeholder="Rechercher un métier, secteur...">
        </div>

        <div class="filters-scroll" id="filterChips" style="margin-bottom: 16px;"></div>

        <div class="cards-list" id="catalogueList"></div>

        <div id="emptyState" style="display: none;">
            <div class="empty-state">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--gris)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <p>Aucun résultat pour cette recherche. Essaie un autre terme ou filtre.</p>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Accueil
        </a>
        <a href="catalogue.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Catalogue
        </a>
        <a href="results.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Résultats
        </a>
        <a href="assistant.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Assistant
        </a>
    </nav>
</div>

<script src="js/core/storage.js"></script>
<script src="js/core/auth-guard.js"></script>
<script src="js/catalogue/catalogue.js"></script>
<script src="js/catalogue/filters.js"></script>
</body>
</html>
